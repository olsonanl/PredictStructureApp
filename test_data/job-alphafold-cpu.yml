# CWL job: AlphaFold 2 CPU mode (no GPU relax)
tool: alphafold
input_file:
  class: File
  path: simple_protein.fasta
output_dir: output
num_recycles: 3
device: cpu
af2_data_dir:
  class: Directory
  path: /databases
af2_model_preset: monomer
af2_db_preset: reduced_dbs
af2_max_template_date: "2022-01-01"
